<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CineVerse - Открой мир кино за секунды</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>CineVerse</h1>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Найти фильм или сериал...">
            <button id="search-btn">Найти</button>
        </div>
    </header>
    <main>
        <div class="genres-bar" id="genres-bar"></div>
        <button id="reset-filter-btn" class="genre-btn">Все жанры</button>
        <div class="genres-bar" id="genres-bar"></div>
        <h2 id="section-title">Популярное сейчас</h2>
        <div class="movies-grid" id="movies-grid"></div>
    </main>
    <div class="modal" id="modal">
    <div class="modal-content">
        <button class="modal-close" id="modal-close">&times;</button>
        <div id="modal-body"></div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
